services:
  - type: web
    name: calorie-line-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: APP_NAME
        value: calorie-line-app
      - key: APP_TIMEZONE
        value: Asia/Tokyo
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: DATABASE_URL
        fromDatabase:
          name: calorie-line-db
          property: connectionString

databases:
  - name: calorie-line-db
    plan: free
